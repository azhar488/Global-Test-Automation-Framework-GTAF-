<!DOCTYPE html>
<html>
<head><title>KIRO Icon Generator</title></head>
<body>
<p>Open this file in a browser, right-click each canvas and "Save Image As" to get your icons.</p>
<canvas id="c16" width="16" height="16"></canvas>
<canvas id="c32" width="32" height="32"></canvas>
<canvas id="c48" width="48" height="48"></canvas>
<canvas id="c128" width="128" height="128"></canvas>
<script>
function drawIcon(id, size) {
  const canvas = document.getElementById(id);
  const ctx = canvas.getContext('2d');
  // Background circle
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.arc(size/2, size/2, size/2, 0, Math.PI * 2);
  ctx.fill();
  // Red recording dot
  ctx.fillStyle = '#e94560';
  ctx.beginPath();
  ctx.arc(size/2, size/2, size * 0.3, 0, Math.PI * 2);
  ctx.fill();
  // K letter
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${size * 0.35}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('K', size/2, size/2);
}
drawIcon('c16', 16);
drawIcon('c32', 32);
drawIcon('c48', 48);
drawIcon('c128', 128);
</script>
</body>
</html>
